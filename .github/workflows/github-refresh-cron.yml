# Freshness safety-net for the live GitHub portfolio (ADR 0004, #25 R5).
# The "double" is normally delivered by two event sources: heal-on-read (Next
# after() → POST /github/heal when a viewer hits a stale snapshot) and the org
# webhook (push → POST /github/webhook). This cron is the THIRD source — it keeps
# data fresh when nobody is viewing AND no webhook fired. It POSTs the existing
# secret-guarded /github/refresh, which runs under a single-flight advisory lock
# and only upserts (→ Realtime broadcast) when GitHub returns genuinely-new data
# (ETag/304 gate), so an idle run is cheap.
#
# Gated: needs the repo Actions secret BACKEND_REFRESH_SECRET (its VALUE must
# equal the backend's GITHUB_REFRESH_SECRET env — the Actions secret can't be
# named with the reserved GITHUB_ prefix). Optionally set the repo variable
# BACKEND_URL to override the default prod backend. Until the secret is set the
# job no-ops. Scheduled workflows only run on the default branch (activates on
# merge to master).
name: github-refresh-cron

on:
  schedule:
    - cron: '0 * * * *' # hourly safety-net; heal-on-read + webhook cover active traffic
  workflow_dispatch: {} # manual "refresh now"

concurrency:
  group: github-refresh-cron
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger backend refresh (safety-net)
        env:
          REFRESH_SECRET: ${{ secrets.BACKEND_REFRESH_SECRET }}
          BACKEND_URL: ${{ vars.BACKEND_URL || 'https://t4-fastwork-nestjs.vercel.app' }}
        run: |
          if [ -z "$REFRESH_SECRET" ]; then
            echo "BACKEND_REFRESH_SECRET not set — no-op (safety-net disabled)."
            exit 0
          fi
          code=$(curl -sS -o /tmp/body -w '%{http_code}' -X POST \
            -H "x-refresh-secret: $REFRESH_SECRET" \
            "$BACKEND_URL/github/refresh")
          echo "POST $BACKEND_URL/github/refresh -> HTTP $code"
          cat /tmp/body 2>/dev/null || true
          echo
          # 2xx = refreshed or single-flight-skipped (both fine). Anything else
          # (401 bad secret, 5xx backend down) is a real failure worth surfacing.
          case "$code" in 2*) exit 0 ;;
            *) echo "::error::refresh failed with HTTP $code"; exit 1 ;;
          esac

      # #157 — fill null projects.live_url from GitHub homepage in list snapshots.
      # No LLM; default cap 50. Fail-soft. Needs org/member list refresh above first.
      - name: Fill missing live_url from GitHub homepage
        env:
          REFRESH_SECRET: ${{ secrets.BACKEND_REFRESH_SECRET }}
          BACKEND_URL: ${{ vars.BACKEND_URL || 'https://t4-fastwork-nestjs.vercel.app' }}
        run: |
          [ -z "$REFRESH_SECRET" ] && { echo "secret unset — skip"; exit 0; }
          code=$(curl -sS -o /tmp/body -w '%{http_code}' -X POST \
            -H "x-refresh-secret: $REFRESH_SECRET" -H "Content-Type: application/json" \
            -d '{"apply":true}' "$BACKEND_URL/github/fill-live-urls")
          echo "POST $BACKEND_URL/github/fill-live-urls -> HTTP $code"; cat /tmp/body 2>/dev/null || true; echo
          case "$code" in 2*) : ;; *) echo "::warning::fill-live-urls failed HTTP $code (non-blocking)" ;; esac

      # #158 — capped missing-README backfill (default 1 repo/run). Prefer this over
      # raising the broad refresh detail budget; fail-soft so a GitHub hiccup never
      # reds the cron. Runs BEFORE case-study gen so newly synced READMEs can feed it
      # on a later hourly pass (same run may still miss if detail just landed).
      - name: Backfill missing README detail snapshots
        env:
          REFRESH_SECRET: ${{ secrets.BACKEND_REFRESH_SECRET }}
          BACKEND_URL: ${{ vars.BACKEND_URL || 'https://t4-fastwork-nestjs.vercel.app' }}
        run: |
          [ -z "$REFRESH_SECRET" ] && { echo "secret unset — skip"; exit 0; }
          code=$(curl -sS -o /tmp/body -w '%{http_code}' -X POST \
            -H "x-refresh-secret: $REFRESH_SECRET" -H "Content-Type: application/json" \
            -d '{"apply":true}' "$BACKEND_URL/github/refresh/missing-readme")
          echo "POST $BACKEND_URL/github/refresh/missing-readme -> HTTP $code"; cat /tmp/body 2>/dev/null || true; echo
          case "$code" in 2*) : ;; *) echo "::warning::missing-readme backfill failed HTTP $code (non-blocking)" ;; esac

      # After a successful refresh, chain the showcase pipeline (Phase 1 automation):
      # cached snapshots -> draft projects (curate) -> member repo choices (sync) ->
      # AI display order (rank). All secret-guarded, apply-mode, and FAIL-SOFT — a
      # downstream endpoint hiccup warns but never reds the whole cron (refresh already
      # succeeded). Each no-ops if the secret is unset. Sequential: rank after the writes.
      - name: Curate cached repos -> draft projects
        env:
          REFRESH_SECRET: ${{ secrets.BACKEND_REFRESH_SECRET }}
          BACKEND_URL: ${{ vars.BACKEND_URL || 'https://t4-fastwork-nestjs.vercel.app' }}
        run: |
          [ -z "$REFRESH_SECRET" ] && { echo "secret unset — skip"; exit 0; }
          code=$(curl -sS -o /tmp/body -w '%{http_code}' -X POST \
            -H "x-refresh-secret: $REFRESH_SECRET" -H "Content-Type: application/json" \
            -d '{"apply":true}' "$BACKEND_URL/github/curate")
          echo "POST $BACKEND_URL/github/curate -> HTTP $code"; cat /tmp/body 2>/dev/null || true; echo
          case "$code" in 2*) : ;; *) echo "::warning::curate failed HTTP $code (non-blocking)" ;; esac

      - name: Sync member public repos -> member_projects choices
        env:
          REFRESH_SECRET: ${{ secrets.BACKEND_REFRESH_SECRET }}
          BACKEND_URL: ${{ vars.BACKEND_URL || 'https://t4-fastwork-nestjs.vercel.app' }}
        run: |
          [ -z "$REFRESH_SECRET" ] && { echo "secret unset — skip"; exit 0; }
          code=$(curl -sS -o /tmp/body -w '%{http_code}' -X POST \
            -H "x-refresh-secret: $REFRESH_SECRET" -H "Content-Type: application/json" \
            -d '{"apply":true}' "$BACKEND_URL/github/sync-member-projects")
          echo "POST $BACKEND_URL/github/sync-member-projects -> HTTP $code"; cat /tmp/body 2>/dev/null || true; echo
          case "$code" in 2*) : ;; *) echo "::warning::member-sync failed HTTP $code (non-blocking)" ;; esac

      # Generate a bilingual case study for each github project whose README changed
      # (ADR 0013). Capped per run (CASE_STUDY_MAX_PER_RUN, default 1 — one ~29s
      # generation fits the 60s function), so it converges over successive hourly
      # runs; the delta-gate skips unchanged repos. BEFORE rank so new blog content
      # is ranked in the same run. Fail-soft; no-ops if the secret is unset.
      - name: Generate case studies from changed READMEs
        env:
          REFRESH_SECRET: ${{ secrets.BACKEND_REFRESH_SECRET }}
          BACKEND_URL: ${{ vars.BACKEND_URL || 'https://t4-fastwork-nestjs.vercel.app' }}
        run: |
          [ -z "$REFRESH_SECRET" ] && { echo "secret unset — skip"; exit 0; }
          code=$(curl -sS -o /tmp/body -w '%{http_code}' -X POST \
            -H "x-refresh-secret: $REFRESH_SECRET" -H "Content-Type: application/json" \
            -d '{"apply":true}' "$BACKEND_URL/github/generate-case-studies")
          echo "POST $BACKEND_URL/github/generate-case-studies -> HTTP $code"; cat /tmp/body 2>/dev/null || true; echo
          case "$code" in 2*) : ;; *) echo "::warning::case-study gen failed HTTP $code (non-blocking)" ;; esac

      - name: Refresh AI display-rank
        env:
          REFRESH_SECRET: ${{ secrets.BACKEND_REFRESH_SECRET }}
          BACKEND_URL: ${{ vars.BACKEND_URL || 'https://t4-fastwork-nestjs.vercel.app' }}
        run: |
          [ -z "$REFRESH_SECRET" ] && { echo "secret unset — skip"; exit 0; }
          code=$(curl -sS -o /tmp/body -w '%{http_code}' -X POST \
            -H "x-refresh-secret: $REFRESH_SECRET" "$BACKEND_URL/rank/refresh")
          echo "POST $BACKEND_URL/rank/refresh -> HTTP $code"; cat /tmp/body 2>/dev/null || true; echo
          case "$code" in 2*) : ;; *) echo "::warning::rank refresh failed HTTP $code (non-blocking)" ;; esac
